<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Add / Delete Parcels</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
    }

    #loginScreen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 1.5em;
      color: #555;
      gap: 15px;
    }

    #appContainer {
      display: none;
      max-width: 500px;
      margin: 60px auto;
      background: white;
      padding: 35px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 14px;
      margin-top: 12px;
    }

    button {
      width: 90%;
      padding: 14px;
      margin-top: 20px;
    }

    #signInBtn {
      display: none;
    }
  </style>
</head>

<body>

<div id="loginScreen">
  <div id="loginMessage">Loading secure app...</div>
  <button id="signInBtn">Sign In</button>
</div>

<div id="appContainer">
  <h2>Inactivate Parcel</h2>

  <input id="parcelInput" placeholder="Enter Parcel Number" />
  <input id="futuresInput" placeholder="Enter Future Parcel Numbers" />

  <button id="submitBtn" style="display:none;">Submit Inactivation</button>

  <div id="confirmContainer">
    <span>Are you sure you want to inactivate this parcel?</span><br/>
    <button class="confirmYes">Yes</button>
    <button class="confirmNo">No</button>
  </div>

  <div id="parcelInfo"></div>
  <div id="status"></div>
</div>

<script>
require([
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
  "esri/request"
], function(OAuthInfo, esriId, esriRequest) {

  const featureLayerUrl =
    "https://services3.arcgis.com/qACnxJSsTspwubRv/arcgis/rest/services/service_f6d0b40f569c4851b2227f1f41e55aba/FeatureServer/0";

  const oauthInfo = new OAuthInfo({
    appId: "5cZGuKwUnUDFpAJ7",
    portalUrl: "https://bwsd.maps.arcgis.com",
    popup: true,
    popupCallbackUrl: "https://bountifulirrigation.github.io/Deletions/oauth-callback.html",
    redirectUri: "https://bountifulirrigation.github.io/Deletions/"
  });

  esriId.registerOAuthInfos([oauthInfo]);

  const loginMessage = document.getElementById("loginMessage");
  const signInBtn = document.getElementById("signInBtn");

  async function initAuth() {
    try {
      await esriId.checkSignInStatus(oauthInfo.portalUrl + "/sharing");
      startApp();
    } catch {
      loginMessage.innerText = "Please sign in to continue.";
      signInBtn.style.display = "block";
    }
  }

  signInBtn.addEventListener("click", async () => {
    signInBtn.disabled = true;
    loginMessage.innerText = "Opening sign-in...";
    try {
      await esriId.getCredential(oauthInfo.portalUrl + "/sharing");
      startApp();
    } catch (err) {
      console.error(err);
      loginMessage.innerText = "Authentication failed.";
      signInBtn.disabled = false;
    }
  });

  initAuth();

  function startApp() {
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("appContainer").style.display = "block";
    parcelInput.focus();
  }

  let currentObjectId = null;
  let existingFutures = "";

  const parcelInput = document.getElementById("parcelInput");
  const futuresInput = document.getElementById("futuresInput");
  const submitBtn = document.getElementById("submitBtn");
  const info = document.getElementById("parcelInfo");
  const status = document.getElementById("status");
  const confirmContainer = document.getElementById("confirmContainer");
  const confirmYes = document.querySelector(".confirmYes");
  const confirmNo = document.querySelector(".confirmNo");

  function lookupParcel() {
    const parcel = parcelInput.value.trim();

    submitBtn.style.display = "none";
    futuresInput.style.display = "none";
    info.style.display = "none";
    confirmContainer.style.display = "none";
    status.innerHTML = "";
    currentObjectId = null;
    existingFutures = "";

    if (!parcel) return;

    status.innerHTML = "Searching...";

    esriRequest(featureLayerUrl + "/query", {
      method: "post",
      query: {
        f: "json",
        where: "TAX_SER_NO = '" + parcel + "'",
        outFields: "*",
        returnGeometry: false
      }
    }).then(function(response) {

      if (response.data.features.length === 0) {
        status.innerHTML = "Parcel not found.";
        return;
      }

      const attrs = response.data.features[0].attributes;
      currentObjectId = attrs.objectid;
      existingFutures = attrs.FUTURES || "";

      if (attrs.Parcel_Status !== "Active") {
        status.innerHTML = "Parcel already inactive.";
        return;
      }

      info.innerHTML = "<strong>Owner:</strong> " + (attrs.Owner_Name || "N/A");
      info.style.display = "block";
      futuresInput.style.display = "block";
      submitBtn.style.display = "block";
      status.innerHTML = "Ready";

    }).catch(console.error);
  }

  parcelInput.addEventListener("blur", lookupParcel);

  submitBtn.addEventListener("click", function() {
    confirmContainer.style.display = "block";
  });

  confirmNo.onclick = () => confirmContainer.style.display = "none";

  confirmYes.addEventListener("click", async function() {
    confirmContainer.style.display = "none";

    let futuresValue = futuresInput.value.trim() || existingFutures;

    const year = new Date().getFullYear().toString().slice(-2);

    let cred;
    try {
      cred = await esriId.checkSignInStatus(oauthInfo.portalUrl + "/sharing");
    } catch {
      cred = await esriId.getCredential(oauthInfo.portalUrl + "/sharing");
    }

    esriRequest(featureLayerUrl + "/applyEdits", {
      method: "post",
      query: {
        f: "json",
        updates: JSON.stringify([{
          attributes: {
            objectid: currentObjectId,
            Parcel_Status: "Inactive",
            ACTIVITY: "DEL" + year,
            FUTURES: futuresValue
          }
        }])
      },
      authentication: cred
    }).then(r => {
      if (r.data.updateResults[0].success) {
        status.innerHTML = "✅ Success";
      } else {
        status.innerHTML = "Update failed";
      }
    }).catch(console.error);
  });

});
</script>

</body>
</html>
